<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Golf Club Rota</title>
<style>
:root{--ink:#111827;--muted:#6b7280;--line:#e5e7eb;--bg:#f8fafc;--card:#fff;}
*{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink);}
header{position:sticky;top:0;background:#fff;border-bottom:1px solid var(--line);z-index:10;padding:14px 16px;}
h1{margin:0;font-size:24px;} .updated{font-size:13px;color:var(--muted);margin-top:4px;}
main{padding:14px;max-width:1180px;margin:0 auto;}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0;}
button,select,input,textarea{font:inherit;}
button,.btn{border:1px solid #cbd5e1;background:#fff;border-radius:10px;padding:9px 12px;cursor:pointer;}
button.active{background:#111827;color:#fff;border-color:#111827;}
select,input,textarea{border:1px solid #cbd5e1;border-radius:10px;padding:9px;background:#fff;}
.week-title{font-size:20px;margin:18px 0 8px;}
.day{background:var(--card);border:1px solid var(--line);border-radius:14px;margin:12px 0;overflow:hidden;}
.day h3{margin:0;padding:12px 14px;background:#eef2ff;font-size:16px;}
.shift{display:grid;grid-template-columns:1.2fr 1fr 1fr auto;gap:8px;align-items:center;padding:10px 14px;border-top:1px solid var(--line);}
.job{font-weight:700;padding:4px 8px;border-radius:999px;display:inline-block;}
.staff{font-weight:700;} .time,.hours{color:#374151;}
.empty{padding:14px;color:var(--muted);}
.site-range{background:#e9d5ff}.starter{background:#ffedd5}.green{background:#bbf7d0}.bar{background:#fed7aa}.jungle{background:#dbeafe}.manager{background:#e5e7eb}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;padding:16px;z-index:50;}
.modal{background:#fff;border-radius:16px;padding:16px;max-width:520px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.modal h2{margin-top:0}.form-row{margin:10px 0;display:flex;flex-direction:column;gap:5px;}
.small{font-size:13px;color:var(--muted)}
@media(max-width:700px){.shift{grid-template-columns:1fr}.shift button{width:100%;}}
</style>
</head>

<header>
<h1>Golf Club Rota</h1>
<div class="updated">Last updated: Friday 3 July 2026, 22:13</div>

<div class="toolbar">

<button id="tab-next" onclick="setWeek(&quot;next&quot;)">Next week</button>
<button onclick="clearStaff()">Show full rota</button>
<select id="staffSelect" onchange="setStaff(this.value)"></select>
<button onclick="copyStaffLink()">Copy staff link</button>
<button onclick="location.reload()">Refresh rota</button>
</div>
<div class="small">Swipe sideways if needed. Use “Report hours change” for extra or reduced hours.</div>
<section id="app"></section>
</main>
<div class="modal-bg" id="modalBg">
<div class="modal">
<h2>Report hours change</h2>
<p id="shiftSummary" class="small"></p>
<form id="requestForm" method="POST" target="submitFrame" action="https://script.google.com/a/wearecutco.com/macros/s/AKfycbwt4dm7btLYu7el6j2dr12xUKEtFJ4cGH2KXx5ydV4/dev">
<input type="hidden" name="staff" id="f_staff">
<input type="hidden" name="job" id="f_job">
<input type="hidden" name="weekStart" id="f_weekStart">
<input type="hidden" name="shiftDate" id="f_shiftDate">
<input type="hidden" name="dayLabel" id="f_dayLabel">
<input type="hidden" name="scheduledTime" id="f_scheduledTime">
<input type="hidden" name="scheduledHours" id="f_scheduledHours">
<div class="form-row">
<label>Extra / reduced hours</label>
<input name="hoursDelta" id="hoursDelta" type="number" step="0.25" required placeholder="Example: 1.5 or -2">
<div class="small">Use a minus number for reduced hours.</div>
</div>
<div class="form-row">
<label>Reason / note</label>
<textarea name="reason" rows="4" required></textarea>
</div>
<div class="toolbar">
<button type="button" onclick="closeModal()">Cancel</button>
<button type="submit">Submit request</button>
</div>
<div id="submitMsg" class="small"></div>
</form>
<iframe name="submitFrame" style="display:none"></iframe>
</div>
</div>

var selectedWeek = "current";
var selectedStaff = "";
var flatShifts = [];
function init(){
  var params = new URLSearchParams(window.location.search);
  selectedStaff = params.get("staff") || "";
  var week = params.get("week");
  if (week && ROTA_DATA.weeks[week]) selectedWeek = week;
  var sel = document.getElementById("staffSelect");
  sel.innerHTML = "";
  var opt = document.createElement("option"); opt.value=""; opt.textContent="Staff view"; sel.appendChild(opt);
  ROTA_DATA.staff.forEach(function(name){ var o=document.createElement("option"); o.value=name; o.textContent=name; sel.appendChild(o); });
  sel.value = selectedStaff;
  render();
}
function setWeek(key){ selectedWeek = key; render(); }
function setStaff(name){ selectedStaff = name || ""; render(); }
function clearStaff(){ selectedStaff = ""; document.getElementById("staffSelect").value = ""; render(); }
function copyStaffLink(){
  var url = new URL(window.location.href);
  if (selectedStaff) url.searchParams.set("staff", selectedStaff); else url.searchParams.delete("staff");
  url.searchParams.set("week", selectedWeek);
  navigator.clipboard && navigator.clipboard.writeText(url.toString());
  alert("Staff link copied");
}
function render(){
  ["last","current","next"].forEach(function(k){ var b=document.getElementById("tab-"+k); if(b) b.className = k===selectedWeek ? "active" : ""; });
  var week = ROTA_DATA.weeks[selectedWeek];
  flatShifts = [];
  var html = "";
  html += "<h2 class=\"week-title\">" + esc(week.label) + ": week commencing " + esc(week.weekStartDisplay) + "</h2>";
  if (selectedStaff) html += "<p><strong>" + esc(selectedStaff) + "</strong> · " + staffHours(week, selectedStaff) + " weekly hours</p>";
  week.days.forEach(function(day){
    var shifts = day.shifts.filter(function(s){ return !selectedStaff || norm(s.staff) === norm(selectedStaff); });
    html += "<div class=\"day\"><h3>" + esc(day.label) + "</h3>";
    if (!shifts.length) html += "<div class=\"empty\">No shifts</div>";
    shifts.forEach(function(s){
      var id = flatShifts.length; flatShifts.push(s);
      html += "<div class=\"shift\">";
      html += "<div><span class=\"job " + jobClass(s.job) + "\">" + esc(s.job) + "</span></div>";
      html += "<div class=\"staff\">" + esc(s.staff) + "</div>";
      html += "<div class=\"time\">" + esc(s.time) + " · " + esc(String(s.hours)) + " hrs</div>";
      html += "<button onclick=\"openRequest(" + id + ")\">Report hours change</button>";
      html += "</div>";
    });
    html += "</div>";
  });
  document.getElementById("app").innerHTML = html;
}
function staffHours(week, staff){
  var total = 0;
  week.days.forEach(function(day){ day.shifts.forEach(function(s){ if(norm(s.staff)===norm(staff)) total += Number(s.hours || 0); }); });
  return Math.round(total * 100) / 100;
}
function openRequest(id){
  if (!ROTA_DATA.webAppUrl) { alert("Hours request form is not connected yet."); return; }
  var s = flatShifts[id];
  document.getElementById("f_staff").value = s.staff;
  document.getElementById("f_job").value = s.job;
  document.getElementById("f_weekStart").value = ROTA_DATA.weeks[selectedWeek].weekStartIso;
  document.getElementById("f_shiftDate").value = s.dateIso;
  document.getElementById("f_dayLabel").value = s.dayLabel;
  document.getElementById("f_scheduledTime").value = s.time;
  document.getElementById("f_scheduledHours").value = s.hours;
  document.getElementById("shiftSummary").textContent = s.staff + " · " + s.job + " · " + s.dayLabel + " · " + s.time;
  document.getElementById("submitMsg").textContent = "";
  document.getElementById("modalBg").style.display = "flex";
}
function closeModal(){ document.getElementById("modalBg").style.display = "none"; }
document.getElementById("requestForm").addEventListener("submit", function(){
  document.getElementById("submitMsg").textContent = "Submitting...";
  setTimeout(function(){ document.getElementById("submitMsg").textContent = "Submitted. Thank you."; }, 900);
});
function jobClass(job){
  var j = norm(job);
  if (j.indexOf("SITE") >= 0) return "site-range";
  if (j.indexOf("STARTER") >= 0) return "starter";
  if (j.indexOf("GREEN") >= 0) return "green";
  if (j.indexOf("BAR") >= 0) return "bar";
  if (j.indexOf("JUNGLE") >= 0) return "jungle";
  if (j.indexOf("MANAGER") >= 0) return "manager";
  return "";
}
function norm(v){ return String(v || "").trim().toUpperCase(); }
function esc(v){ return String(v == null ? "" : v).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","\'":"&#39;"}[c];}); }
