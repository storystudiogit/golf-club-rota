<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Previous Rotas</title>
  <style>
    body {
      margin: 0;
      padding: 18px;
      background: #f5f7fb;
      color: #111827;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      line-height: 1.4;
    }

    main {
      max-width: 720px;
      margin: 0 auto;
      background: white;
      border: 1px solid #d8e0ec;
      border-radius: 18px;
      padding: 18px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: 24px;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    li {
      border-top: 1px solid #eef2f7;
    }

    li:first-child {
      border-top: 0;
    }

    a {
      display: block;
      padding: 13px 0;
      color: #111827;
      font-weight: 700;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .back {
      display: inline-block;
      margin-top: 18px;
      font-size: 14px;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main>
    <h1>Previous Rotas</h1>
    <ul>
      
      <li>
        <a href="rotas/2026-06-01.html">Week commencing Monday 1 June 2026</a>
      </li>
    
      <li>
        <a href="rotas/2026-05-25.html">Week commencing Monday 25 May 2026</a>
      </li>
    
    </ul>
    <a class="back" href="index.html">Back to current rota</a>
  </main>

  <script>
    (function () {
      var select = document.getElementById('staffSelect');
      var copyButton = document.getElementById('copyStaffLink');
      var resetButton = document.getElementById('resetStaffView');

      function normalise(value) {
        return String(value || '').trim().toLowerCase();
      }

      function applyStaffView(staffName) {
        var selected = normalise(staffName);
        var rows = document.querySelectorAll('tbody tr');

        document.body.setAttribute('data-staff-view', selected ? 'on' : 'off');

        rows.forEach(function (row) {
          var hasMatch = false;
          var staffCells = row.querySelectorAll('td[data-staff]');

          staffCells.forEach(function (cell) {
            var isMatch = selected && normalise(cell.getAttribute('data-staff')) === selected;

            cell.classList.toggle('selected-staff', Boolean(isMatch));

            if (isMatch) {
              hasMatch = true;
            }
          });

          row.classList.toggle('hide-for-staff', Boolean(selected && !hasMatch));
        });
      }

      function currentStaffUrl() {
        var url = new URL(window.location.href);
        var staffName = select.value;

        if (staffName) {
          url.searchParams.set('staff', staffName);
        } else {
          url.searchParams.delete('staff');
        }

        return url.toString();
      }

      function updateUrl() {
        var url = currentStaffUrl();
        window.history.replaceState(null, '', url);
        return url;
      }

      function copyText(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          return navigator.clipboard.writeText(text);
        }

        var temp = document.createElement('textarea');
        temp.value = text;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand('copy');
        document.body.removeChild(temp);
        return Promise.resolve();
      }

      select.addEventListener('change', function () {
        applyStaffView(select.value);
        updateUrl();
      });

      copyButton.addEventListener('click', function () {
        var url = updateUrl();

        copyText(url).then(function () {
          var original = copyButton.textContent;
          copyButton.textContent = 'Copied';
          setTimeout(function () {
            copyButton.textContent = original;
          }, 1600);
        });
      });

      resetButton.addEventListener('click', function () {
        select.value = '';
        applyStaffView('');
        updateUrl();
      });

      var params = new URLSearchParams(window.location.search);
      var initialStaff = params.get('staff');

      if (initialStaff) {
        for (var i = 0; i < select.options.length; i++) {
          if (normalise(select.options[i].value) === normalise(initialStaff)) {
            select.selectedIndex = i;
            break;
          }
        }

        applyStaffView(select.value);
      }
    })();
  </script>

</body>
</html>
